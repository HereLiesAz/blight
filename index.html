<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ninth Ward Canvas - Tactical Mapping Tool</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0b">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    <script src="https://unpkg.com/leaflet.heat/dist/leaflet-heat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background-color: #0b0b0b; font-family: -apple-system, sans-serif; overflow: hidden; }
        #map { width: 100%; height: 100vh; }
        #loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #FFBF00; font-family: monospace; font-size: 16px; z-index: 2000; background: rgba(11,11,11,0.9); padding: 12px 24px; border: 1px solid #FFBF00; border-radius: 4px; text-transform: uppercase; pointer-events: none; display: none; }
        .popup-content { font-size: 14px; color: #333; min-width: 220px; }
        .popup-content h3 { margin: 0 0 8px 0; font-size: 16px; border-bottom: 1px solid #ccc; padding-bottom: 4px; }
        .popup-content p { margin: 4px 0; }
        .hud-controls { position: absolute; bottom: 20px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 8px; }
        .hud-btn { background: #222; color: #eee; border: 2px solid #444; border-radius: 8px; padding: 10px 15px; cursor: pointer; min-width: 44px; font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.5); display: flex; justify-content: center; }
        .hud-btn.active { background: #007bff; border-color: #0056b3; }
        #install-btn { display: none; background: #FFBF00; color: #0b0b0b; border-color: #FFBF00; }
        #ghost-btn { background: #900; color: #fff; border-color: #f00; }
        #sync-status { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: #222; color: #0f0; padding: 5px 15px; border-radius: 20px; border: 1px solid #0f0; font-family: monospace; font-size: 12px; z-index: 1000; display: none; }
        .leaflet-bar a { width: 44px !important; height: 44px !important; line-height: 44px !important; font-size: 22px !important; }
        .leaflet-control-layers { background: #222 !important; color: #eee !important; border: 2px solid #444 !important; border-radius: 8px !important; }
        .copy-btn { margin-top: 8px; width: 100%; background: #222; color: #FFBF00; border: 1px solid #FFBF00; padding: 6px; border-radius: 4px; cursor: pointer; font-family: monospace; font-weight: bold; }
        .note-stash { width: 100%; box-sizing: border-box; background: #111; color: #0f0; border: 1px solid #444; margin-top: 8px; height: 50px; font-family: monospace; resize: none; padding: 4px; border-radius: 4px; }
        .route-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 8px; }
        .route-btn { background: #333; color: #fff; border: 1px solid #555; padding: 6px; border-radius: 4px; cursor: pointer; font-weight: bold; text-align: center; font-size: 12px; }
        .img-preview { max-width: 100%; border-radius: 4px; margin-top: 5px; display: none; }
        
        /* Tactical Overlays */
        #camo-ui { display: none; position: absolute; inset: 0; z-index: 9999; background: #87CEEB; color: #fff; text-align: center; padding-top: 20vh; font-family: -apple-system, sans-serif; }
        #camo-ui h1 { font-size: 80px; margin: 0; font-weight: 300; }
        #camo-ui p { font-size: 24px; margin: 10px 0; }
        #camo-trigger { position: absolute; top: 0; left: 0; width: 80px; height: 80px; z-index: 9998; background: transparent; }
        #qr-modal { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff; padding: 20px; border-radius: 8px; z-index: 2001; }
        #qr-modal canvas { max-width: 100%; }
        #qr-close { margin-top: 10px; width: 100%; padding: 8px; background: #333; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
        
        .time-panel { position: absolute; bottom: 20px; left: 20px; z-index: 1000; background: rgba(17,17,17,0.9); padding: 10px; border: 1px solid #444; border-radius: 8px; width: 250px; }
        .time-panel input[type=range] { width: 100%; }
        .time-panel label { color: #FFBF00; font-family: monospace; font-size: 12px; display: block; margin-bottom: 5px; text-align: center;}
    </style>
</head>
<body>
    <div id="loading">Scanning Sector...</div>
    <div id="sync-status">📡 ONLINE</div>
    <div id="camo-trigger" onclick="toggleCamo()"></div>
    
    <div id="camo-ui" onclick="toggleCamo()">
        <p>New Orleans</p>
        <h1>72°</h1>
        <p>Partly Cloudy</p>
        <p>H:78° L:65°</p>
    </div>

    <div id="qr-modal">
        <div id="qrcode"></div>
        <button id="qr-close" onclick="document.getElementById('qr-modal').style.display='none'">Close Link</button>
    </div>

    <div id="map"></div>
    
    <div class="time-panel">
        <label id="time-label">⏳ Timeline: ALL TIME</label>
        <input type="range" id="time-slider" min="0" max="12" value="12" onchange="filterTimeline()">
    </div>

    <div class="hud-controls">
        <button id="install-btn" class="hud-btn">✨ Install PWA</button>
        <button id="net-btn" class="hud-btn" onclick="generateQR()">🕸️ Beam Intel</button>
        <button id="gps-toggle" class="hud-btn">📍 Track GPS</button>
        <button id="ghost-btn" class="hud-btn" onclick="ghostProtocol()">⚠️ GHOST</button>
    </div>

    <script>
        const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 20 });
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 20 });
        const map = L.map('map', { zoomControl: false, layers: [darkMap] }).setView([29.95, -90.07], 12);
        L.control.zoom({ position: 'topright' }).addTo(map);

        const guiltyLayer = L.layerGroup().addTo(map);
        const uncommittedLayer = L.layerGroup().addTo(map);
        const heatLayer = L.heatLayer([], { radius: 25, blur: 15, maxZoom: 17 }).addTo(map);
        L.control.layers({ "Tactical Dark": darkMap, "Satellite": satelliteMap }, { "<span style='color: #ff0000;'>Guilty</span>": guiltyLayer, "<span style='color: #FFBF00;'>Uncommitted</span>": uncommittedLayer, "🔥 Heatmap": heatLayer }, { position: 'topright', collapsed: false }).addTo(map);

        let masterData = [];
        let syncQueue = new Set();
        const syncUI = document.getElementById('sync-status');
        
        window.addEventListener('online', () => { syncUI.innerText = '📡 FLUSHING QUEUE'; syncUI.style.color = '#0f0'; syncUI.style.borderColor = '#0f0'; setTimeout(() => { syncQueue.clear(); syncUI.style.display = 'none'; }, 2000); });
        window.addEventListener('offline', () => { syncUI.innerText = '🚫 OFFLINE QUEUE'; syncUI.style.color = '#f00'; syncUI.style.borderColor = '#f00'; syncUI.style.display = 'block'; });

        function getNote(addr) { try { return atob(localStorage.getItem('txt_' + addr) || ''); } catch { return ''; } }
        function getImg(addr) { return localStorage.getItem('img_' + addr) || ''; }
        
        window.saveNote = function(addr, val) { localStorage.setItem('txt_' + addr, btoa(val)); if(!navigator.onLine) syncQueue.add(addr); };

        window.toggleCamo = function() {
            const ui = document.getElementById('camo-ui');
            ui.style.display = ui.style.display === 'block' ? 'none' : 'block';
        };

        window.ghostProtocol = function() {
            localStorage.clear();
            stopGps();
            document.body.style.filter = 'contrast(2) brightness(0)';
            setTimeout(() => location.reload(), 800);
        };

        window.generateQR = function() {
            let stash = [];
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                if (key.startsWith('txt_')) stash.push({ a: key.replace('txt_', ''), n: getNote(key.replace('txt_', '')) });
            }
            if(stash.length === 0) return alert('No intel to beam.');
            document.getElementById('qrcode').innerHTML = '';
            new QRCode(document.getElementById("qrcode"), { text: JSON.stringify(stash), width: 256, height: 256, correctLevel: QRCode.CorrectLevel.L });
            document.getElementById('qr-modal').style.display = 'block';
        };

        window.captureOptics = function(event, addr, imgId) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas'); const ctx = canvas.getContext('2d'); const scale = 300 / img.width;
                    canvas.width = 300; canvas.height = img.height * scale; ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    const b64 = canvas.toDataURL('image/jpeg', 0.5);
                    localStorage.setItem('img_' + addr, b64);
                    document.getElementById(imgId).src = b64; document.getElementById(imgId).style.display = 'block';
                    if(!navigator.onLine) syncQueue.add(addr);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        function parseSocrataDate(dateStr) {
            if (!dateStr || typeof dateStr !== 'string') return new Date();
            if (dateStr.includes('T')) { const p = dateStr.split('T')[0].split('-'); return new Date(parseInt(p[0]), parseInt(p[1]) - 1, parseInt(p[2])); }
            if (dateStr.length >= 8 && !dateStr.includes('-')) { return new Date(parseInt(dateStr.substring(0, 4)), parseInt(dateStr.substring(4, 6)) - 1, parseInt(dateStr.substring(6, 8))); }
            const d = new Date(dateStr); return isNaN(d.getTime()) ? new Date() : d;
        }

        window.filterTimeline = function() {
            const slider = document.getElementById('time-slider');
            const monthsBack = 12 - parseInt(slider.value);
            document.getElementById('time-label').innerText = monthsBack === 0 ? "⏳ Timeline: ALL TIME" : `⏳ Timeline: PAST ${parseInt(slider.value)} MONTHS`;
            
            const cutoffDate = new Date();
            cutoffDate.setMonth(cutoffDate.getMonth() - parseInt(slider.value));

            guiltyLayer.clearLayers(); uncommittedLayer.clearLayers();
            let activeHeat = [];

            masterData.forEach(item => {
                if(monthsBack === 0 || item.date >= cutoffDate) {
                    activeHeat.push([item.lat, item.lng]);
                    addMarker(item.lat, item.lng, item.prop, false);
                }
            });
            heatLayer.setLatLngs(activeHeat);
        };

        async function fetchSectorData() {
            const SOQL_QUERY = encodeURI(`?$select=geoaddress AS address, prevhearingresult AS status, casefiled AS notice_date, the_geom AS location, caseno AS casenumber&$where=within_box(the_geom, ${map.getBounds().getNorth()}, ${map.getBounds().getWest()}, ${map.getBounds().getSouth()}, ${map.getBounds().getEast()})&$limit=50000`);
            try {
                const response = await fetch('https://data.nola.gov/resource/gjzc-adg8.json' + SOQL_QUERY);
                const data = await response.json();
                
                data.forEach(prop => {
                    if (!prop.location || masterData.some(m => m.caseno === prop.casenumber)) return;
                    const lat = prop.location.coordinates[1]; const lng = prop.location.coordinates[0];
                    let status = (prop.status && prop.status.toLowerCase().includes('guilty')) ? 'Guilty' : 'Uncommitted';
                    const noticeDate = parseSocrataDate(prop.notice_date);
                    
                    masterData.push({ caseno: prop.casenumber, lat: lat, lng: lng, date: noticeDate, prop: { address: prop.address || 'Unknown', status: status, noticeDate: noticeDate.toLocaleDateString(), deadline: new Date(noticeDate.setDate(noticeDate.getDate() + 30)).toLocaleDateString() }});
                });
                filterTimeline();
            } catch (error) { console.error("Signal Lost"); }
        }

        function addMarker(lat, lng, property, saveToMaster = true) {
            const isGuilty = property.status === 'Guilty';
            const marker = L.circleMarker([lat, lng], { radius: 8, fillColor: isGuilty ? '#ff0000' : '#FFBF00', color: '#fff', weight: 1, fillOpacity: 0.8 });
            if (isGuilty) guiltyLayer.addLayer(marker); else uncommittedLayer.addLayer(marker);

            const safeAddr = property.address.replace(/'/g, "\\'");
            const imgData = getImg(safeAddr);
            
            marker.bindPopup(`
<div class="popup-content">
  <h3>${property.address}</h3>
  <p><b>Status:</b> ${property.status}</p>
  <img id="img_${safeAddr}" class="img-preview" src="${imgData}" style="display:${imgData ? 'block' : 'none'};">
  <textarea class="note-stash" placeholder="Intel stash..." onchange="saveNote('${safeAddr}', this.value)">${getNote(safeAddr)}</textarea>
  <div class="route-grid">
    <input type="file" accept="image/*" capture="environment" id="cam_${safeAddr}" style="display:none;" onchange="captureOptics(event, '${safeAddr}', 'img_${safeAddr}')">
    <button class="route-btn" onclick="document.getElementById('cam_${safeAddr}').click()">📸 Optics</button>
    <button class="route-btn" onclick="window.open('https://maps.apple.com/?daddr=${lat},${lng}&dirflg=d')">🍎 Route</button>
  </div>
</div>`.trim());
        }

        const gpsToggle = document.getElementById('gps-toggle'); let watchId = null; let userMarker = null;
        gpsToggle.addEventListener('click', () => {
            if (watchId === null) {
                gpsToggle.classList.add('active');
                watchId = navigator.geolocation.watchPosition((pos) => {
                    const loc = L.latLng(pos.coords.latitude, pos.coords.longitude);
                    if (userMarker) userMarker.setLatLng(loc); else userMarker = L.circleMarker(loc, { radius: 10, fillColor: '#007bff', color: '#fff', weight: 2, fillOpacity: 0.9 }).addTo(map);
                    map.setView(loc);
                }, () => stopGps(), { enableHighAccuracy: true });
            } else stopGps();
        });
        function stopGps() { if (watchId !== null) navigator.geolocation.clearWatch(watchId); watchId = null; gpsToggle.classList.remove('active'); if (userMarker) { map.removeLayer(userMarker); userMarker = null; } }
        
        map.on('moveend', fetchSectorData); map.whenReady(fetchSectorData);

        let dPrompt;
        window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); dPrompt = e; document.getElementById('install-btn').style.display = 'block'; });
        document.getElementById('install-btn').addEventListener('click', async () => { if (dPrompt) { dPrompt.prompt(); await dPrompt.userChoice; document.getElementById('install-btn').style.display = 'none'; dPrompt = null; } });
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
    </script>
</body>
</html>
